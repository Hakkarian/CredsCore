version: '3.8'

services:
  # ─── API Gateway (Python) ─────────────────────────────────────────
  api-gateway:
    build:
      context: ../services
      dockerfile: api-gateway/Dockerfile
    container_name: credscore-api-gateway
    ports:
      - "4000:4000"
    environment:
      - MAIN_SERVER_URL=http://server:8000
      - CREDIT_SCORING_URL=http://credit-scoring:8000
      - FRAUD_DETECTION_URL=http://fraud-detection:8000
      - DATA_ENRICHMENT_URL=http://data-enrichment:8000
      - POLICY_URL=http://policy:8000
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - PORT=4000
    depends_on:
      - server
      - credit-scoring
      - fraud-detection
      - data-enrichment
      - policy
      - orchestrator
    restart: unless-stopped

  # ─── Message Broker & Cache ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: credscore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: credscore-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Auth & Admin ─────────────────────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: credscore-pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pocketbase-data:/pb_data
      - pocketbase-hooks:/pb_hooks
    restart: unless-stopped

  # ─── Main Server ──────────────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: credscore-main-server
    ports:
      - "8000:8000"
    volumes:
      - ../server:/app
      - ../saved_models:/app/saved_models
      - ../data:/app/data
    environment:
      - SERVICE_NAME=main-server
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_PATH=/app/data/main_server.db
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Microservices ────────────────────────────────────────────────
  credit-scoring:
    build:
      context: ../services
      dockerfile: credit-scoring/Dockerfile
    container_name: credscore-credit-scoring
    ports:
      - "8001:8000"
    volumes:
      - ../services/credit-scoring/saved_models:/app/saved_models
      - ../services/credit-scoring/data:/app/data
    environment:
      - SERVICE_NAME=credit-scoring
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_PATH=/app/data/credit_scoring.db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  fraud-detection:
    build:
      context: ../services
      dockerfile: fraud-detection/Dockerfile
    container_name: credscore-fraud-detection
    ports:
      - "8002:8000"
    volumes:
      - ../services/fraud-detection/saved_models:/app/saved_models
      - ../services/fraud-detection/data:/app/data
    environment:
      - SERVICE_NAME=fraud-detection
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_PATH=/app/data/fraud_detection.db
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  data-enrichment:
    build:
      context: ../services
      dockerfile: data-enrichment/Dockerfile
    container_name: credscore-data-enrichment
    ports:
      - "8006:8000"
    environment:
      - SERVICE_NAME=data-enrichment
      - PORT=8000
    restart: unless-stopped

  policy:
    build:
      context: ../services
      dockerfile: policy/Dockerfile
    container_name: credscore-policy
    ports:
      - "8003:8000"
    volumes:
      - ../services/policy/data:/app/data
    environment:
      - SERVICE_NAME=policy
      - PORT=8000
      - DATABASE_PATH=/app/data/policy.db
    restart: unless-stopped

  report-generator:
    build:
      context: ../services
      dockerfile: report-generator/Dockerfile
    container_name: credscore-report-generator
    ports:
      - "8004:8000"
    volumes:
      - ../services/report-generator/data:/app/data
      - ../services/report-generator/reports:/app/reports
    environment:
      - SERVICE_NAME=report-generator
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_PATH=/app/data/report_generator.db
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build:
      context: ../services
      dockerfile: orchestrator/Dockerfile
    container_name: credscore-orchestrator
    ports:
      - "8005:8000"
    volumes:
      - ../services/orchestrator/data:/app/data
    environment:
      - SERVICE_NAME=orchestrator
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_PATH=/app/data/orchestrator.db
      - CREDIT_SCORING_URL=http://credit-scoring:8000
      - FRAUD_DETECTION_URL=http://fraud-detection:8000
      - POLICY_URL=http://policy:8000
      - ENRICHMENT_URL=http://data-enrichment:8000
      - REPORT_GENERATOR_URL=http://report-generator:8000
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  kafka-data:
  pocketbase-data:
  pocketbase-hooks: